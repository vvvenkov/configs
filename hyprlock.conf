# ~/.config/hypr/hyprlock.conf

general {
    hide_cursor = true
}

background {
    monitor =
    color = rgba(0,0,0,1.0)
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255,255,255,1.0)
    font_size = 80
    font_family = monospace

    position = 0, 40
    halign = center
    valign = center
}

# Password field
input-field {
    monitor =
    size = 220, 40
    outline_thickness = 2

    outer_color = rgba(255,255,255,1.0)
    inner_color = rgba(0,0,0,1.0)
    font_color = rgba(255,255,255,1.0)

    fade_on_empty = false
    rounding = 0

    position = 0, -60
    halign = center
    valign = center
}
